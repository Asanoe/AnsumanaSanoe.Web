<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web</title>
    <link rel="stylesheet" href="styles.css">
    <script src="modernizr.custom.05819.js"></script>
    <style>
        /* 1. Color / Font Styles */
        body {
            font-family: 'Arial', sans-serif;
            color: #333333; /* Dark Grey Font */
            line-height: 1.6;
            margin: 0;
            padding: 0;
            
            background-color: #f0f0f0;
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
        }

        header {
            background-color: #004a99;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* 2. (Rollover) */
        .main-pic {
            width: 100%;
            max-width: 400px;
            height: auto;
            display: block;
            margin: 20px auto;
            border: 4px solid #004a99;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .main-pic:hover {
            transform: scale(1.05); 
            filter: brightness(1.1); /
        }

        /* 3. Footer Styles */
        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: #ccc;
            font-size: 0.9rem;
        }

        footer a {
            color: #00bfff;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    </ul>
</nav>
