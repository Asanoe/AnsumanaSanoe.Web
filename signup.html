<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join the Community | Islamic Apparel</title>
    <link rel="stylesheet" href="styles.css"> <style>
        .form-container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            border-top: 5px solid #2d5a27; /* Your brand green */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        button { background: #2d5a27; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; }
        button:hover { background: #d4af37; color: #2d5a27; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Join Our Newsletter</h2>
        <form action="process.php" method="POST">
            <label>Full Name:</label>
            <input type="text" name="fullname" required placeholder="Enter your name">

            <label>Email Address:</label>
            <input type="email" name="email" required placeholder="email@example.com">

            <label>Create Password:</label>
            <input type="password" name="password" required>

            <button type="submit">Create Account</button>
        </form>
    </div>
</body>
</html>
