<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Work | Loop Logic</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f9f7f2; color: #333; margin: 0; }
        header { background-color: #2d5a27; color: white; padding: 30px; text-align: center; border-bottom: 3px solid #d4af37; }
        .container { max-width: 850px; margin: 30px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h2 { color: #2d5a27; border-left: 5px solid #d4af37; padding-left: 15px; margin-top: 30px; }
        .result-box { background: #fdfdfd; padding: 20px; margin: 15px 0; border: 1px solid #eee; font-family: 'Courier New', monospace; font-size: 1.1rem; color: #444; }
        strong { color: #2d5a27; }
    </style>
</head>
<body>

<header>
    <h1>PHP Loop</h1>
</header>

<div class="container">
    <h2>1) Numbers 1 to 18:</h2>
    <div class="result-box" id="loop1"></div>

    <h2>2) Numbers 1 to 27:</h2>
    <div class="result-box" id="loop2"></div>

    <h2>3) Numbers 1 to 15:</h2>
    <div class="result-box" id="loop3"></div>

    <h2>4) Odd numbers from 2 to 21:</h2>
    <div class="result-box" id="loop4"></div>

    <h2>5) Even numbers from 3 to 17:</h2>
    <div class="result-box" id="loop5"></div>
</div>

<script>
    // 1. For Loop 1-18
    let res1 = "";
    for (let i = 1; i <= 18; i++) { res1 += i + " "; }
    document.getElementById('loop1').innerText = res1;

    // 2. While Loop 1-27
    let res2 = "";
    let j = 1;
    while (j <= 27) { res2 += j + " "; j++; }
    document.getElementById('loop2').innerText = res2;

    // 3. Do-While Loop 1-15
    let res3 = "";
    let k = 1;
    do { res3 += k + " "; k++; } while (k <= 15);
    document.getElementById('loop3').innerText = res3;

    // 4. Sum of Odds (Formatted)
    let sum = 0;
    let odds = [];
    for (let l = 2; l <= 21; l++) {
        if (l % 2 !== 0) {
            odds.push(l);
            sum += l;
        }
    }
    document.getElementById('loop4').innerHTML = odds.join(" + ") + "<br><strong>Sum: " + sum + "</strong>";

    // 5. Product of Evens (Formatted)
    let product = 1;
    let evens = [];
    for (let m = 3; m <= 17; m++) {
        if (m % 2 === 0) {
            evens.push(m);
            product *= m;
        }
    }
    document.getElementById('loop5').innerHTML = evens.join(" × ") + "<br><strong>Product: " + product + "</strong>";
</script>

</body>
</html>
